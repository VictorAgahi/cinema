<div class="home-header">
    <div class="sort-container">
        <label for="sort-select">Trier par :</label>
        <select id="sort-select" class="form-select" [ngModel]="sortType()" (ngModelChange)="sortType.set($event)">
            <option value="title">Titre (A-Z)</option>
            <option value="rate">Note (Décroissante)</option>
            <option value="date">Date de sortie (Récente)</option>
        </select>
    </div>
</div>

<div class="movies-grid">
    @for (movie of sortedMovies(); track movie.id) {
        <app-movie-card [movie]="movie"></app-movie-card>
    }
</div>
