<div class="card m-4">
  @if(movie.image) {
    <img [src]="'http://localhost:8080/movies/' + movie.id + '/image'" class="card-img-top" alt="">
  }
  <div class="card-body">
    <h5 class="card-title">{{movie.title}}</h5>
    <p class="card-text">{{movie.synopsis}}</p>
    <label class="note">Note: {{movie.rate}} / 5</label>
  </div>
</div>
