<div class="form-page">
  <div class="form-card">
    <h1>Modifier un film</h1>

    <form (ngSubmit)="updateMovie()" class="d-flex flex-column gap-4">
      <div class="field">
        <label for="title">Titre</label>
        <input type="text" id="title" name="title" [(ngModel)]="movie.title" class="form-control" />
      </div>

      <div class="field">
        <label for="director">Réalisateur</label>
        <input type="text" id="director" name="director" [(ngModel)]="movie.director" class="form-control" />
      </div>

      <div class="field">
        <label for="releaseDate">Date de sortie</label>
        <input type="date" id="releaseDate" name="releaseDate" [(ngModel)]="movie.releaseDate" class="form-control" />
      </div>

      <div class="field">
        <label for="synopsis">Synopsis</label>
        <textarea id="synopsis" name="synopsis" [(ngModel)]="movie.synopsis" class="form-control"></textarea>
      </div>

      <button type="submit" class="btn btn-warning">Modifier</button>
    </form>
  </div>
</div>
